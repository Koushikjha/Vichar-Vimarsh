<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Phone Login</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }

        body {
            height: 100vh;
            background: linear-gradient(-45deg, #667eea, #764ba2, #6a11cb, #2575fc);
            background-size: 400% 400%;
            animation: gradientMove 10s ease infinite;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .card {
            width: 360px;
            padding: 35px;
            border-radius: 20px;
            backdrop-filter: blur(15px);
            background: rgba(255,255,255,0.1);
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            color: white;
        }

        h2 { text-align: center; margin-bottom: 25px; }

        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 18px;
            border-radius: 10px;
            border: none;
            outline: none;
            background: rgba(255,255,255,0.2);
            color: white;
        }

        input::placeholder { color: rgba(255,255,255,0.7); }

        button {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            font-weight: 600;
        }

        .primary {
            background: white;
            color: #667eea;
        }

        .secondary {
            margin-top: 10px;
            background: transparent;
            border: 1px solid white;
            color: white;
        }

        .msg {
            text-align: center;
            margin-top: 12px;
            font-size: 13px;
        }

        .error { color: #ff6b6b; }
        .success { color: #4dff88; }
    </style>
</head>

<body>

<div class="card">
    <h2>Login</h2>

    <!-- ===================== -->
    <!-- STEP 1: SEND OTP (JSON) -->
    <!-- ===================== -->
    <div th:if="${param.otpSent == null}">

        <input type="text"
               id="phone"
               th:value="${param.phone}"
               placeholder="Enter phone number"
               required />

        <button type="button" class="primary" onclick="sendOtp()">
            Send OTP
        </button>

    </div>

    <!-- ===================== -->
    <!-- STEP 2: VERIFY OTP -->
    <!-- ===================== -->
    <div th:if="${param.otpSent != null}">

        <input type="hidden" id="phoneHidden" th:value="${param.phone}" />

        <p style="margin-bottom:12px;font-size:14px;opacity:0.85;">
            OTP sent to <strong th:text="${param.phone}"></strong>
        </p>

        <input type="text"
               id="otp"
               placeholder="Enter 6-digit OTP"
               maxlength="6"
               required />

        <button type="button" class="primary" onclick="verifyOtp()">
            Verify & Login
        </button>

    </div>

    <!-- Messages -->
    <div class="msg error" th:if="${param.error != null}">
        Invalid OTP or phone number.
    </div>

    <div class="msg success" th:if="${param.otpSent != null}">
        OTP sent successfully!
    </div>

    <form th:action="@{/register}" method="get">
        <button type="submit" class="secondary">Create Account</button>
    </form>
</div>

<script>
    /* =========================
       SEND OTP (JSON REQUEST)
       ========================= */
    async function sendOtp() {
        const phone = document.getElementById("phone").value;

        const response = await fetch("/api/v1/auth/send-otp", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ phone: phone })
        });

        if (response.ok) {
            window.location.href = "/login?otpSent=true&phone=" + phone;
        } else {
            alert("Failed to send OTP");
        }
    }

    /* =========================
       VERIFY OTP (JSON REQUEST)
       ========================= */
    async function verifyOtp() {
        const phone = document.getElementById("phoneHidden").value;
        const otp = document.getElementById("otp").value;

        const response = await fetch("/api/v1/auth/verify-otp", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                phone: phone,
                otp: otp
            })
        });

        if (response.ok) {
            window.location.href = "/home";
        } else {
            alert("Invalid OTP");
        }
    }
</script>

</body>
</html>
